<!DOCTYPE html>
<html>
<head>
    <title>Ma Bibliothèque</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('home') }}">Recherche</a>
        <a href="{{ url_for('show_library') }}">Ma Bibliothèque</a>
    </nav>

    <h1>Ma Bibliothèque</h1>

    <div class="library-container">
        {% if library %}
            {% for book in library %}
            <div class="book-item" style="border-bottom: 1px solid #ccc; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: white; margin-bottom: 10px; border-radius: 8px;">
                
                <div>
                    <strong>{{ book.titre }}</strong><br>
                    <span style="color: #666;"><em>{{ book.auteur }}</em></span>
                </div>
                
                <div style="display: flex; gap: 10px; align-items: center;">
                    <a href="{{ url_for('quiz', book_id=book.id) }}" 
                       style="background: #3498db; color: white; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-size: 0.9em;">
                        Lancer le Quiz
                    </a>

                    <form action="{{ url_for('delete', book_id=book.id) }}" method="POST" style="margin: 0;">
                        <button type="submit" 
                                style="background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.9em;">
                            Supprimer
                        </button>
                    </form>
                </div>

            </div>
            {% endfor %}
        {% else %}
            <p style="text-align: center; color: #7f8c8d;">Ta bibliothèque est vide. Ajoute des livres depuis la page recherche !</p>
        {% endif %}
    </div>

</body>
</html>
